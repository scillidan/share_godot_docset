name: Release Fix

on:
  workflow_dispatch:
    inputs:
      stable_version:
        description: 'Docset version to build (e.g., 4.6)'
        required: true
        default: '4.6'
      source_commit:
        description: 'godot-docs commit SHA to build from (e.g., 50cd88b...)'
        required: true
        default: '50cd88b6de119d8266a5fad967408fd7f1b2fe83'

env:
  stable_version: ${{ github.event.inputs.stable_version }}
  upstream_owner: 'godotengine'
  upstream_repo: 'godot-docs'

jobs:
  release-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout self repo
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip tar python3-pip
        python3 -m pip install --upgrade pip

    - name: Clone godot-docs and checkout source commit
      run: |
        git clone https://github.com/${{ env.upstream_owner }}/${{ env.upstream_repo }}.git
        cd ${{ env.upstream_repo }}
        git checkout ${{ github.event.inputs.source_commit }}
        echo "Checked out commit:"
        git log -1 --oneline

    - name: Build HTML docs with Sphinx
      run: |
        cd ${{ env.upstream_repo }}
        pip install -r requirements.txt
        sphinx-build -b html docs godot-docs-html-${{ env.stable_version }}
        echo "Built HTML docs:"
        ls -lh godot-docs-html-${{ env.stable_version }} | head -20

    - name: Copy built docs to workspace
      run: |
        cp -r ${{ env.upstream_repo }}/godot-docs-html-${{ env.stable_version }} ./

    - name: Run doc2dash
      run: |
        pip install doc2dash
        folder="godot-docs-html-${{ env.stable_version }}"
        if [ ! -d "$folder" ]; then
          echo "Folder $folder not found!"
          exit 1
        fi
        doc2dash --icon icon.png --icon-2x icon@2x.png \
          --name "godot-${{ env.stable_version }}" -f "$folder"

    - name: Update info.plist
      run: |
        plist_path="godot-${{ env.stable_version }}.docset/Contents/Info.plist"
        perl -0777 -i -pe '
          s{(<key>CFBundleIdentifier</key>\s*<string>)godot-${{ env.stable_version }}(</string>)}{$1godot$2}g;
          s{(<key>CFBundleName</key>\s*<string>)godot-${{ env.stable_version }}(</string>)}{$1Godot ${{ env.stable_version }}$2}g;
        ' "$plist_path"

    - name: Create tgz
      run: |
        tar --exclude='.DS_Store' -czf "Godot-${{ env.stable_version }}-docset.tgz" \
          "godot-${{ env.stable_version }}.docset"

    - name: Generate checksums.txt
      run: |
        sha256sum "Godot-${{ env.stable_version }}-docset.tgz" > checksums.txt

    - name: Delete existing fix release if tag exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FIX_TAG: ${{ env.stable_version }}-fix
      run: |
        gh release delete "$FIX_TAG" --yes || true
        git tag -d "$FIX_TAG" || true
        git push origin ":refs/tags/$FIX_TAG" || true

    - name: Create GitHub Release (Fix)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FIX_TAG: ${{ env.stable_version }}-fix
        COMMIT: ${{ github.event.inputs.source_commit }}
      run: |
        gh release create "$FIX_TAG" \
          "Godot-${{ env.stable_version }}-docset.tgz" \
          checksums.txt \
          --title "Godot ${{ env.stable_version }} Fix ($FIX_TAG)" \
          --notes "Fixed docset built from godotengine/godot-docs@$COMMIT"
